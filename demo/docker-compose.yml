services:
  demo-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: ${DEMO_API_PORT:-8787}
      EXECUTOR_BASE_URL: ${EXECUTOR_BASE_URL:-http://host.docker.internal:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DEMO_API_PORT:-8787}:8787"

  demo-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_DEMO_API_BASE_URL: /api
    depends_on:
      - demo-api
    ports:
      - "${DEMO_WEB_PORT:-5173}:80"
